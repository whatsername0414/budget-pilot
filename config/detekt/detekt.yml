build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

formatting:
  # ktlint (config'd separately via .editorconfig) is the single source of truth for formatting.
  active: false

naming:
  FunctionNaming:
    ignoreAnnotated: ["Composable"]

style:
  MaxLineLength:
    # Matches ktlint's own default line-length ceiling (ktlint_official code
    # style, 140) so the two tools don't disagree on where to wrap a line.
    maxLineLength: 140
  MagicNumber:
    ignoreNumbers: ["-1", "0", "1", "2", "3", "100"]
    ignoreAnnotated: ["Preview", "PreviewLightDark", "PreviewScreenSizes", "PreviewFontScale", "PreviewDynamicColors"]
    excludes: ["**/theme/Color.kt", "**/test/**", "**/androidTest/**"]
  UnusedPrivateMember:
    ignoreAnnotated: ["Preview", "PreviewLightDark", "PreviewScreenSizes", "PreviewFontScale", "PreviewDynamicColors"]
  ReturnCount:
    # The house Result pattern (android-error-handling skill) is a chain of early-return guard
    # clauses ("if (x) return Result.Error(...)") rather than a single terminal expression, so
    # functions validating several conditions or branching over a sealed outcome type routinely
    # exceed the rule's default of 2 without being any less readable for it.
    max: 4

performance:
  SpreadOperator:
    active: false

exceptions:
  TooGenericExceptionCaught:
    # The android-error-handling skill's data-layer pattern is: catch a broad
    # Exception at the data source/repository boundary, rethrow
    # CancellationException, and map everything else to a typed
    # DataError.Local/.Network — this repeats in every repository, so it's a
    # deliberate, skill-sanctioned pattern rather than a bug to flag.
    active: false

complexity:
  LongMethod:
    threshold: 80
  CyclomaticComplexMethod:
    # ConfirmExpenseViewModel.onAction (feature:capture:presentation) dispatches seven
    # additional line-item CRUD branches on top of its existing per-field actions — one
    # flat `when` matching this project's other Action dispatchers, not a hidden nested
    # state machine.
    threshold: 22
  LongParameterList:
    functionThreshold: 8
    # InsightCheckUseCase (feature:insights:data) wires nine single-purpose collaborators
    # (three repos, cloud-AI prefs, rule engine, throttle policy, message composer, store,
    # clock) — a legitimate orchestration use case, not a class needing a parameter object.
    constructorThreshold: 10
  TooManyFunctions:
    # ConfirmExpenseViewModel (feature:capture:presentation) gained three small,
    # single-purpose line-item CRUD handlers (open/save/remove) alongside its existing
    # per-field update functions — a legitimate one-ViewModel-per-screen growth, not a
    # class that needs splitting.
    thresholdInClasses: 13

Compose:
  ComposableAnnotationNaming:
    active: true
  ComposableNaming:
    active: true
  ComposableParamOrder:
    active: true
  CompositionLocalAllowlist:
    active: false
  CompositionLocalNaming:
    active: true
  ContentEmitterReturningValues:
    active: true
  LambdaParameterEventTrailing:
    active: true
  LambdaParameterInRestartableEffect:
    active: true
  ModifierComposed:
    active: true
  ModifierMissing:
    active: true
  ModifierNaming:
    active: true
  ModifierNotUsedAtRoot:
    active: true
  ModifierReused:
    active: true
  ModifierWithoutDefault:
    active: true
  MultipleEmitters:
    active: true
  MutableParams:
    active: true
  MutableStateAutoboxing:
    active: true
  MutableStateParam:
    active: true
  PreviewAnnotationNaming:
    active: true
  PreviewPublic:
    active: true
  RememberMissing:
    active: true
  UnstableCollections:
    active: true
  ViewModelForwarding:
    active: true
  ViewModelInjection:
    active: true
